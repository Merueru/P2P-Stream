    document.getElementById('unlimited-mode').addEventListener('change', () => {
        if (myStream) {
            updateStreamingParameters(); // เรียกใช้ฟังก์ชันปรับแต่งที่เราเพิ่งเขียน
        }
    });
    // ระบบหยุดวิดีโออัตโนมัติเมื่อพับหน้าจอหรือสลับแท็บ เพื่อเซฟ CPU/GPU
    document.addEventListener('visibilitychange', () => {
        const focusVideo = document.getElementById('focus-video');
        const remoteVideos = document.querySelectorAll('.video-card video');

        if (document.hidden) {
            // เมื่อสลับแท็บไปที่อื่น: สั่งหยุดการเล่นวิดีโอทั้งหมด (แต่ไม่ปิด Stream เสียง)
            if (focusVideo.srcObject) focusVideo.pause();
            remoteVideos.forEach(v => v.pause());
            console.log("ระบบหยุดวิดีโอชั่วคราวเพื่อประหยัด CPU (เสียงยังคงทำงาน)");
        } else {
            // เมื่อกลับมาที่หน้าเว็บ: สั่งให้วิดีโอกลับมาเล่นต่อทันที
            if (focusVideo.srcObject) focusVideo.play().catch(e => console.error(e));
        remoteVideos.forEach(v => {
            if (v.srcObject && v.dataset.visible === "true") v.play().catch(e => console.error(e));
            });
            console.log("ระบบกลับมาแสดงวิดีโอตามปกติ");
        }
    });

    // --- ระบบคำนวณ Stats แบบ Real-time ---
    let statsInterval = null;
    // เก็บข้อมูลสถิติแยกตาม ID ของแต่ละคน เพื่อไม่ให้เลขตีกัน
    let streamStatsMap = {};

function toggleStatsOverlay() {
    const isShow = document.getElementById('show-stats-toggle').checked;
    const overlay = document.getElementById('stats-overlay');
    overlay.style.display = isShow ? 'block' : 'none';

    if (isShow) {
        streamStatsMap = {}; 
        // ถ้าเปิดติ๊กถูก ให้เริ่มจับเวลาคำนวณทุกๆ 1 วินาที (1000ms)
        statsInterval = setInterval(updateStreamStats, 1000);
    } else {
        // ถ้าปิด ให้หยุดคำนวณทันทีเพื่อประหยัด CPU
        clearInterval(statsInterval);
            document.getElementById('stat-res').innerText = "0x0";
            document.getElementById('stat-fps').innerText = "0";
            document.getElementById('stat-bitrate').innerText = "0";
            document.getElementById('stat-ping').innerText = "0";
            document.getElementById('stat-loss').innerText = "0";
            streamStatsMap = {};
    }
}

 async function updateStreamStats() {
    const fv = document.getElementById('focus-video');
    const ownerId = fv.getAttribute('data-owner');

    if (!fv.srcObject || !ownerId) return;

    // ✅ ถ้า ownerId เปลี่ยน (สลับจากเพื่อนคนเก่ามาคนใหม่) ให้รีเซต
    if (streamStatsMap['_lastOwnerId'] !== ownerId) {
        streamStatsMap = {};
        streamStatsMap['_lastOwnerId'] = ownerId;
    }

    document.getElementById('stat-res').innerText = fv.videoWidth + "x" + fv.videoHeight;

    // lastSsrc เพิ่มเข้ามาเพื่อตรวจจับการเริ่มสตรีมใหม่
    if (!streamStatsMap[ownerId]) {
        streamStatsMap[ownerId] = { lastBytes: 0, lastTime: 0, lastFrames: 0, lastSsrc: null };
    }

    let pc = null; 
    let isLocal = (ownerId === 'me');

    if (isLocal) {
        // หา Connection ล่าสุดที่เรากำลังส่งออกไปให้เพื่อนคนใดคนหนึ่ง
        for (const peerId in peer.connections) {
            const conns = peer.connections[peerId];
            const mediaConn = conns?.reverse().find(c => c.type === 'media' && c.peerConnection && c.open);
            if (mediaConn) {
                pc = mediaConn.peerConnection;
                break; // เจออันที่ทำงานอยู่แล้วหยุดลูปเลย
            }
        }
    } else {
        // หา Connection ที่เพื่อนส่งมาให้เรา
        const conns = peer.connections[ownerId];
        const mediaConn = conns?.reverse().find(c => c.type === 'media' && c.peerConnection && c.open);
        pc = mediaConn?.peerConnection;
    }

    if (!pc) {
        document.getElementById('stat-fps').innerText = "0";
        document.getElementById('stat-bitrate').innerText = "0";
        document.getElementById('stat-ping').innerText = "0";
        document.getElementById('stat-loss').innerText = "0";
        return;
    }

    try {
        const stats = await pc.getStats();
        let hasVideoStats = false;

        stats.forEach(report => {
            const targetType = isLocal ? 'outbound-rtp' : 'inbound-rtp';
            
            if (report.type === targetType && report.kind === 'video') {
                hasVideoStats = true;
                const now = report.timestamp;
                const bytes = isLocal ? report.bytesSent : report.bytesReceived;
                const currentFrames = isLocal ? report.framesSent : report.framesReceived;
                const currentSsrc = report.ssrc; // ดึงค่า SSRC ของสตรีมปัจจุบัน
                const ownerStats = streamStatsMap[ownerId];

                // --- [REVISED 2.0] ตรวจจับและคำนวณสถิติด้วย if-else ---
                const needsReset = (ownerStats.lastSsrc && currentSsrc && ownerStats.lastSsrc !== currentSsrc) || 
                                   bytes < ownerStats.lastBytes || 
                                   (now - ownerStats.lastTime) > 2000;

                if (!needsReset && ownerStats.lastTime > 0) {
                    // คำนวณค่าต่างๆ เมื่อสตรีมมีความต่อเนื่อง
                    const deltaBytes = bytes - ownerStats.lastBytes;
                    const deltaTime = now - ownerStats.lastTime;
                    
                    if (deltaTime > 0 && deltaBytes >= 0) {
                        // 1. คำนวณ Bitrate
                        const bitrate = ((deltaBytes * 8) / (deltaTime / 1000)) / 1000;
                        document.getElementById('stat-bitrate').innerText = Math.max(0, Math.round(bitrate));

                        // 2. คำนวณ FPS
                        let fps = report.framesPerSecond; 
                        if (fps === undefined && currentFrames !== undefined && ownerStats.lastFrames !== undefined) {
                            const deltaFrames = currentFrames - ownerStats.lastFrames;
                            fps = (deltaFrames * 1000) / deltaTime;
                        }
                        document.getElementById('stat-fps').innerText = Math.max(0, Math.round(fps || 0));
                    }
                }
                // ถ้า needsReset เป็น true บล็อกข้างบนจะถูกข้ามไป
                // ทำให้รอบนี้เป็นการตั้งค่าพื้นฐานเฉยๆ และการคำนวณจะเริ่มในรอบถัดไป

                if (report.jitter) {
                    document.getElementById('stat-ping').innerText = Math.round(report.jitter * 1000);
                }
                if (report.packetsLost !== undefined && report.packetsSent !== undefined && report.packetsSent > 0) {
                    const loss = (report.packetsLost / report.packetsSent) * 100;
                    document.getElementById('stat-loss').innerText = loss.toFixed(2);
                }

                // บันทึกค่าล่าสุดไว้เสมอสำหรับรอบถัดไป
                ownerStats.lastBytes = bytes;
                ownerStats.lastTime = now;
                ownerStats.lastFrames = currentFrames || 0;
                ownerStats.lastSsrc = currentSsrc;
            }
        });

        if (!hasVideoStats) {
             /* document.getElementById('stat-fps').innerText = "0";
             document.getElementById('stat-bitrate').innerText = "0";
             document.getElementById('stat-ping').innerText = "0";
             document.getElementById('stat-loss').innerText = "0"; */ // (ล่าสุด) ถ้าไม่มีสถิติของวิดีโอเลย ไม่ต้องรีเซตเป็น 0 ทันที เพราะอาจจะเป็นแค่ช่วงสั้นๆ ที่ยังไม่คายค่าออกมา แต่ให้เก็บค่าเดิมไว้ก่อนแล้วรอดูในรอบถัดไปแทน
             return; 
        }
    } catch (e) {
        console.error("Stats Error:", e);
    }
}

    function clearLocalChat() {
        if (confirm("คุณต้องการล้างข้อความในหน้าจอของคุณใช่หรือไม่?")) {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = ''; // ลบ HTML ทั้งหมดในช่องแชท
            
            // แจ้งเตือนในระบบเล็กน้อยว่าล้างแล้ว
            const info = document.createElement('div');
            info.style.textAlign = 'center';
            info.style.fontSize = '12px';
            info.style.color = '#888';
            info.innerText = "--- ล้างข้อความแล้ว ---";
            chatMessages.appendChild(info);
        }
    }

    function downloadFile(url, fileName) {
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

</script>
